# Your experiences
experiences:
- company:
    name: Ociris GmbH
    url: "https://www.g-portal.com"
    location: Munich
    # company overview
    overview: GPORTAL is a widely recognized company for private game-server hosting.
  positions:
  - designation: QA Tester/Management and Test Automation
    start: January 2020
    # don't provide end date if you are currently working there. It will be replaced by "Present"
    # end: Dec 2020
    # give some points about what was your responsibilities at the company.
    responsibilities:
     - Establishment and development of quality standards for GPORTAL web interface
     - Introduction and maintenance of the quality management tool Testrail, development of the master test plan and the individual project test plans in coordination with the product owner. 
     - Creation of missing User Stories and Acceptance Criterias which are used as a basis for the individual test cases of the master test plan
     - Evaluation of suitable e2e test automation frameworks. Planning and implementation of the e2e framework cypress.io, definition of a Happy Path test plan for the initial introduction of the framework, reporting of test results via plugin to Testrail, development and maintenance of the e2e test scripts. 
     - Continuous knowledge exchange with the development team when changing front-end frameworks from vanilla.js to vue.js to ensure that existing features meet quality standards in both functionality and design and to ensure the testability of individual components using manual or e2e tests. 
     - Application of different test types and techniques such as explorative testing, decision table creation, threshold analysis, acceptance testing, browser and device compatibility testing, regression testing and result analysis. Creation of bug and feature ticket templates and introduction of release notes. 
     - Writing Release Notes and Coordination of Releases with the Lead Developer
     - Writing Bug Reports and Feature Requests
